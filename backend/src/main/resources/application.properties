# ============================================
# SUMAN E-COMMERCE - APPLICATION CONFIGURATION
# ============================================

spring.application.name=suman-ecommerce

# ========================
# DATABASE CONFIGURATION
# ========================
# !! SIRF YAHAN APNA MYSQL PASSWORD DAALO !!
spring.datasource.url=jdbc:mysql://localhost:3306/suman_ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Akshay@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ========================
# SERVER CONFIGURATION
# ========================
server.port=8080
server.servlet.context-path=/api

# ========================
# JWT CONFIGURATION
# ========================
jwt.secret=SumanBeautyFashionEcommerceSecretKey2024SuperSecure256BitKey
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ========================
# EMAIL CONFIGURATION
# (Abhi ke liye disabled - baad mein set karo)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@suman.com

# ========================
# CLOUDINARY CONFIGURATION
# (Abhi ke liye dummy values - image upload baad mein setup karo)
# ========================
cloudinary.cloud-name=dummy-cloud
cloudinary.api-key=123456789012345
cloudinary.api-secret=dummysecretkey123456789012

# ========================
# RAZORPAY CONFIGURATION
# (Abhi ke liye dummy values - payment baad mein setup karo)
# ========================
razorpay.key-id=rzp_test_dummy
razorpay.key-secret=dummysecretkey123

# ========================
# GOOGLE OAUTH2
# (Optional - abhi ke liye dummy)
# ========================
google.client-id=dummy-google-client-id.apps.googleusercontent.com

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ========================
# CORS
# ========================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ========================
# LOGGING
# ========================
logging.level.com.suman=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========================
# SPRINGDOC / SWAGGER
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
